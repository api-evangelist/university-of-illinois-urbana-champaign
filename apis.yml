aid: university-of-illinois-urbana-champaign
name: University of Illinois Urbana-Champaign
description: >-
  The University of Illinois Urbana-Champaign (UIUC) is a public land-grant research
  university and the flagship campus of the University of Illinois System, ranked #40
  in the QS World University Rankings 2025. Its public developer footprint includes the
  Course Information Suite (CISAPI) Course Explorer API, which exposes class schedule and
  course catalog data without authentication, and the open-source Rokwire platform that
  powers the official Illinois mobile app via a set of building-block APIs (Core,
  Gateway, Content, Notifications, Surveys, and more) published under an Apache 2.0
  license. The University Library exposes institutional repository metadata through the
  IDEALS OAI-PMH endpoint.
