    summary: >-
      UIUC has a strong, genuinely public developer footprint. The Course Explorer CISAPI
      (schedule + catalog) is documented and serves data with no authentication, verified
      live returning XML. The open-source Rokwire platform behind the official Illinois
      app exposes documented Core and Gateway building-block APIs (Swagger UIs live) with
      Apache 2.0 source on the rokwire GitHub org (30 repos). The IDEALS institutional
      repository OAI-PMH endpoint responds to verb=Identify. No fabricated endpoints:
      api.rokwire.illinois.edu root and /docs/ both 404 so were not cataloged. LinkedIn
      returns 999 (anti-bot) but is the canonical school URL.
